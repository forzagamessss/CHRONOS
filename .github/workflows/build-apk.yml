name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Project Dependencies
        run: |
          npm install

      - name: Create Web Distribution folder (www)
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp telegram.browser.js www/telegram.browser.js
          cp jsmediatags.min.js www/jsmediatags.min.js
          cp MaterialSymbolsOutlined.ttf www/MaterialSymbolsOutlined.ttf

      - name: Initialize Capacitor Android Project
        run: |
          npx cap add android

      - name: Generate Android Launcher Icons
        run: |
          node generate-assets.js

      - name: Sync Web Code with Capacitor Android
        run: |
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CHRONOS-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
